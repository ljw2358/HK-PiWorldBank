<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiWorldBank | Open Mainnet</title>

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}
header{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,0.4);
}
select{
padding:5px;
border-radius:5px;
}
.nav{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px;
}
.nav button{
padding:10px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.15);
color:white;
cursor:pointer;
}
.section{
display:none;
padding:20px;
margin:10px;
background:rgba(255,255,255,0.1);
border-radius:20px;
}
.active{display:block;}
input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:none;
}
.action{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#00c6ff;
font-weight:bold;
cursor:pointer;
}
.balance{
font-size:32px;
font-weight:bold;
margin-top:10px;
}
table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}
td,th{
padding:5px;
border-bottom:1px solid rgba(255,255,255,0.2);
font-size:13px;
}
</style>
</head>

<body>

<header>
<div>🌍 PiWorldBank</div>
<select onchange="changeLanguage(this.value)" id="langSelect"></select>
</header>

<div class="nav">
<button onclick="showSection('dashboard')" data-i18n="dashboard"></button>
<button onclick="showSection('pay')" data-i18n="pay"></button>
<button onclick="showSection('send')" data-i18n="send"></button>
<button onclick="showSection('lp')" data-i18n="lp"></button>
<button onclick="showSection('dex')" data-i18n="dex"></button>
<button onclick="showSection('ubi')" data-i18n="ubi"></button>
<button onclick="showSection('reward')" data-i18n="reward"></button>
<button onclick="connectPi()" data-i18n="connect"></button>
</div>

<div id="dashboard" class="section active">
<h3 data-i18n="totalBalance"></h3>
<div class="balance" id="balance">0 Pi</div>
<table>
<thead>
<tr>
<th data-i18n="type"></th>
<th data-i18n="amount"></th>
<th data-i18n="time"></th>
</tr>
</thead>
<tbody id="txTable"></tbody>
</table>
</div>

<div id="pay" class="section">
<h3 data-i18n="pay"></h3>
<input type="number" id="payAmount">
<button class="action" onclick="pay()" data-i18n="execute"></button>
</div>

<div id="send" class="section">
<h3 data-i18n="send"></h3>
<input type="text" placeholder="Wallet">
<input type="number" id="sendAmount">
<button class="action" onclick="send()" data-i18n="execute"></button>
</div>

<div id="lp" class="section">
<h3 data-i18n="lp"></h3>
<input type="number" id="lpAmount">
<button class="action" onclick="depositLP()" data-i18n="execute"></button>
<div id="lpInfo"></div>
</div>

<div id="dex" class="section">
<h3 data-i18n="dex"></h3>
<input type="number" id="swapAmount">
<button class="action" onclick="swap()" data-i18n="execute"></button>
<div id="swapResult"></div>
</div>

<div id="ubi" class="section">
<button class="action" onclick="claimUBI()">UBI 10 Pi</button>
</div>

<div id="reward" class="section">
<button class="action" onclick="reward()">Reward 5 Pi</button>
</div>

<script>
let balance=300;
let currentLang="en";

const translations={
en:{dashboard:"Dashboard",pay:"Pay",send:"Send",lp:"Liquidity",dex:"DEX",ubi:"UBI",reward:"Reward",connect:"Connect Pi",totalBalance:"Total Balance",type:"Type",amount:"Amount",time:"Time",execute:"Execute"},
ko:{dashboard:"대시보드",pay:"결제",send:"송금",lp:"예치",dex:"DEX",ubi:"UBI",reward:"리워드",connect:"Pi 연결",totalBalance:"총 잔액",type:"타입",amount:"수량",time:"시간",execute:"실행"},
ja:{dashboard:"ダッシュボード",pay:"支払い",send:"送金",lp:"流動性",dex:"DEX",ubi:"UBI",reward:"報酬",connect:"Pi接続",totalBalance:"総残高",type:"タイプ",amount:"数量",time:"時間",execute:"実行"},
zh:{dashboard:"仪表板",pay:"支付",send:"发送",lp:"流动性",dex:"DEX",ubi:"UBI",reward:"奖励",connect:"连接Pi",totalBalance:"总余额",type:"类型",amount:"数量",time:"时间",execute:"执行"},
es:{dashboard:"Panel",pay:"Pagar",send:"Enviar",lp:"Liquidez",dex:"DEX",ubi:"UBI",reward:"Recompensa",connect:"Conectar Pi",totalBalance:"Saldo Total",type:"Tipo",amount:"Cantidad",time:"Hora",execute:"Ejecutar"},
fr:{dashboard:"Tableau",pay:"Payer",send:"Envoyer",lp:"Liquidité",dex:"DEX",ubi:"UBI",reward:"Récompense",connect:"Connecter Pi",totalBalance:"Solde Total",type:"Type",amount:"Montant",time:"Heure",execute:"Exécuter"},
de:{dashboard:"Dashboard",pay:"Bezahlen",send:"Senden",lp:"Liquidität",dex:"DEX",ubi:"UBI",reward:"Belohnung",connect:"Pi Verbinden",totalBalance:"Gesamtguthaben",type:"Typ",amount:"Betrag",time:"Zeit",execute:"Ausführen"},
ru:{dashboard:"Панель",pay:"Оплата",send:"Отправить",lp:"Ликвидность",dex:"DEX",ubi:"UBI",reward:"Награда",connect:"Подключить Pi",totalBalance:"Общий баланс",type:"Тип",amount:"Сумма",time:"Время",execute:"Выполнить"}
};

function initLanguage(){
let userLang=navigator.language.slice(0,2);
if(!translations[userLang]) userLang="en";
changeLanguage(userLang);
let select=document.getElementById("langSelect");
for(let lang in translations){
let opt=document.createElement("option");
opt.value=lang;
opt.text=lang.toUpperCase();
select.appendChild(opt);
}
select.value=userLang;
}

function changeLanguage(lang){
currentLang=lang;
document.querySelectorAll("[data-i18n]").forEach(el=>{
el.innerText=translations[lang][el.dataset.i18n];
});
}

function updateBalance(){
document.getElementById("balance").innerText=balance+" Pi";
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function addTx(type,amount){
let row=document.getElementById("txTable").insertRow(0);
row.insertCell(0).innerText=type;
row.insertCell(1).innerText=amount;
row.insertCell(2).innerText=new Date().toLocaleTimeString();
}

function pay(){
let a=parseFloat(document.getElementById("payAmount").value);
if(a>0 && a<=balance){balance-=a;updateBalance();addTx("PAY",-a);}
}

function send(){
let a=parseFloat(document.getElementById("sendAmount").value);
if(a>0 && a<=balance){balance-=a;updateBalance();addTx("SEND",-a);}
}

function depositLP(){
let a=parseFloat(document.getElementById("lpAmount").value);
if(a>0 && a<=balance){balance-=a;updateBalance();addTx("LP",-a);}
}

function swap(){
let a=parseFloat(document.getElementById("swapAmount").value);
if(a>0 && a<=balance){
balance-=a;
updateBalance();
addTx("SWAP",-a);
document.getElementById("swapResult").innerText=a*35+" USDT";
}
}

function claimUBI(){balance+=10;updateBalance();addTx("UBI",10);}
function reward(){balance+=5;updateBalance();addTx("REWARD",5);}

function connectPi(){
if(window.Pi){
Pi.init({version:"2.0"});
Pi.authenticate(["payments"],function(auth){
alert("Connected as "+auth.user.username);
});
}else{
alert("Pi SDK not detected (Sandbox mode)");
}
}

initLanguage();
updateBalance();
</script>

</body>
</html>
