<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiWorldBank - Open Mainnet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background-color: #1e293b; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; }
        .btn-action { background-color: #334155; padding: 0.75rem; border-radius: 1rem; text-align: center; font-size: 0.9rem; }
        .gradient-btn { background: linear-gradient(90deg, #f97316, #ea580c); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🌍</span>
            <h1 class="font-bold text-xl">PiWorldBank</h1>
        </div>
        <select id="langSelect" class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm" onchange="changeLanguage()">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="ua">Українська</option> <option value="jp">日本語</option>
            <option value="cn">简体中文</option>
            <option value="vn">Tiếng Việt</option>
        </select>
    </div>

    <div class="text-center mb-8">
        <h2 id="main-title" class="text-3xl font-bold mb-2">Web3 Digital Bank & DEX Ecosystem</h2>
        <p id="sub-title" class="text-slate-400 text-sm">Liquidity · DEX · UBI · Global Expansion</p>
    </div>

    <div class="gradient-btn p-4 rounded-2xl text-center font-bold mb-6">
        🚀 <span id="launch-text">3월 12일 자체 DEX 거래소 런칭</span>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-8">
        <button class="btn-action" onclick="alert('결제 시스템 준비 중')">결제</button>
        <button class="btn-action" onclick="alert('송금 가능 (메인넷)')">송금</button>
        <button class="btn-action" onclick="alert('예치 완료')">예치</button>
        <button class="btn-action" onclick="alert('리워드 확인')">리워드</button>
        <button class="btn-action" onclick="alert('UBI 신청')">UBI</button>
        <button class="btn-action" onclick="alert('관리자 모드')">관리자</button>
    </div>

    <div class="card">
        <p id="balance-label" class="text-slate-400 text-sm mb-2">총 잔액</p>
        <h2 class="text-5xl font-bold">400 Pi</h2>
    </div>

    <div class="card">
        <h3 id="dex-title" class="font-bold mb-4">DEX 스왑 시뮬레이터</h3>
        <input type="number" id="piInput" placeholder="Pi 입력" class="w-full p-3 rounded-lg bg-slate-900 mb-3 border border-slate-700">
        <button onclick="swapPi()" class="w-full py-3 rounded-lg bg-cyan-500 font-bold text-black">USDT로 스왑</button>
        <p id="swapResult" class="mt-3 text-center text-cyan-400 font-mono"></p>
    </div>

    <div class="card">
        <h3 id="apr-title" class="font-bold mb-4">유동성 풀 APR 계산기</h3>
        <input type="number" id="stakeInput" placeholder="예치 Pi 수량" class="w-full p-3 rounded-lg bg-slate-900 mb-3 border border-slate-700">
        <input type="number" id="aprInput" placeholder="예상 APR (%)" class="w-full p-3 rounded-lg bg-slate-900 mb-3 border border-slate-700">
        <button onclick="calcProfit()" class="w-full py-3 rounded-lg bg-cyan-500 font-bold text-black">수익 계산</button>
        <p id="calcResult" class="mt-3 text-center text-cyan-400 font-mono"></p>
    </div>

    <footer class="text-center text-slate-500 text-xs mt-10">
        <p>Contact: info@hkglobal.com</p>
        <p>© 2026 PiWorldBank Ultimate Edition</p>
    </footer>

    <script>
        // 오픈 메인넷 가정 시세 (1 Pi = 314.159 USDT 가정)
        const PI_PRICE = 314.159;

        const i18n = {
            ko: { title: "Web3 디지털 뱅크", launch: "3월 12일 자체 DEX 런칭", balance: "총 잔액", dex: "DEX 스왑", apr: "APR 계산기" },
            en: { title: "Web3 Digital Bank", launch: "DEX Launch on March 12", balance: "Total Balance", dex: "DEX Swap", apr: "APR Calculator" },
            ua: { title: "Web3 Цифровий банк", launch: "Запуск DEX 12 березня", balance: "Загальний баланс", dex: "DEX своп", apr: "Калькулятор APR" }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            if (i18n[lang]) {
                document.getElementById('main-title').innerText = i18n[lang].title;
                document.getElementById('launch-text').innerText = i18n[lang].launch;
                document.getElementById('balance-label').innerText = i18n[lang].balance;
                document.getElementById('dex-title').innerText = i18n[lang].dex;
                document.getElementById('apr-title').innerText = i18n[lang].apr;
            }
        }

        function swapPi() {
            const pi = document.getElementById('piInput').value;
            if(!pi) return alert('수량을 입력하세요');
            const result = (pi * PI_PRICE).toLocaleString();
            document.getElementById('swapResult').innerText = `결과: ${result} USDT`;
        }

        function calcProfit() {
            const amount = document.getElementById('stakeInput').value;
            const apr = document.getElementById('aprInput').value;
            if(!amount || !apr) return alert('모든 값을 입력하세요');
            const daily = (amount * (apr/100) / 365).toFixed(4);
            document.getElementById('calcResult').innerText = `일일 수익: ${daily} Pi`;
        }
    </script>
</body>
</html>
