<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiWorldBank - Global Web3 Bank</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-orange: #f97316;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --btn-gray: #334155;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 언어 선택창 디자인 개선 */
        #langSelect {
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .hero { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 24px; margin-bottom: 10px; line-height: 1.2; word-break: keep-all; }
        .subtitle { color: var(--text-gray); font-size: 13px; margin-bottom: 25px; }

        .launch-banner {
            background-color: var(--primary-orange);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .grid-btn {
            background-color: var(--btn-gray);
            border: none;
            color: white;
            padding: 18px 5px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .grid-btn.support {
            border: 1px solid #0891b2;
            background-color: rgba(8, 145, 178, 0.1);
        }

        .balance-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        .balance-label { color: var(--text-gray); font-size: 13px; margin-bottom: 8px; }
        .balance-amount { font-size: 40px; font-weight: 800; }
        .balance-amount span { color: var(--primary-orange); font-size: 24px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <div class="logo">🌍 PiWorldBank</div>
        <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en" selected>🇺🇸 English</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="es">🇪🇸 Español</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">DE Deutsch</option>
            <option value="it">IT Italiano</option>
            <option value="pt">PT Português</option>
            <option value="ru">RU Русский</option>
            <option value="ar">SA العربية</option>
            <option value="hi">IN हिन्दी</option>
            <option value="bn">BD বাংলা</option>
            <option value="id">ID Indonesia</option>
            <option value="vi">VN Tiếng Việt</option>
            <option value="th">TH ภาษาไทย</option>
            <option value="tr">TR Türkçe</option>
            <option value="pl">PL Polski</option>
            <option value="nl">NL Nederlands</option>
            <option value="sv">SE Svenska</option>
        </select>
    </div>

    <div class="hero">
        <h1 id="mainTitle">Web3 Digital Bank & DEX Ecosystem</h1>
        <p class="subtitle" id="subTitle">Liquidity · DEX · UBI · Global Expansion</p>
        <div class="launch-banner" id="launchBanner">🚀 DEX Exchange Launch on March 12</div>
    </div>

    <div class="grid-container">
        <button class="grid-btn" id="btnPay">Payment</button>
        <button class="grid-btn" id="btnSend">Send</button>
        <button class="grid-btn" id="btnStake">Stake</button>
        <button class="grid-btn" id="btnReward">Reward</button>
        <button class="grid-btn" id="btnUBI">UBI</button>
        <button class="grid-btn support" id="btnSupport">Support</button>
    </div>

    <div class="balance-card">
        <div class="balance-label" id="balanceLabel">Total Balance</div>
        <div class="balance-amount">400 <span>Pi</span></div>
    </div>
</div>

<script>
    const data = {
        ko: { title: "Web3 디지털 뱅크 & DEX 생태계", sub: "유동성 · DEX · UBI · 글로벌 확장", launch: "🚀 3월 12일 DEX 거래소 출시", pay: "결제", send: "송금", stake: "예치", reward: "리워드", ubi: "기본소득", support: "지원", balance: "총 잔액" },
        en: { title: "Web3 Digital Bank & DEX Ecosystem", sub: "Liquidity · DEX · UBI · Global Expansion", launch: "🚀 DEX Exchange Launch on March 12", pay: "Payment", send: "Send", stake: "Stake", reward: "Reward", ubi: "UBI", support: "Support", balance: "Total Balance" },
        zh: { title: "Web3 数字银行和 DEX 生态系统", sub: "流动性 · DEX · UBI · 全球扩张", launch: "🚀 DEX 交易所于 3 월 12 일上线", pay: "支付", send: "转账", stake: "质押", reward: "奖励", ubi: "全民收入", support: "支持", balance: "总余额" },
        ja: { title: "Web3 デジタルバンク & DEX エコシステム", sub: "流動性 · DEX · UBI · グローバル展開", launch: "🚀 3月12日にDEX取引所が開始", pay: "決済", send: "送金", stake: "預入", reward: "報酬", ubi: "UBI", support: "サポート", balance: "総残高" },
        es: { title: "Ecosistema de Banco Digital Web3 y DEX", sub: "Liquidez · DEX · UBI · Expansión Global", launch: "🚀 Lanzamiento de DEX el 12 de marzo", pay: "Pago", send: "Enviar", stake: "Apostar", reward: "Recompensa", ubi: "Renta Básica", support: "Soporte", balance: "Saldo Total" },
        fr: { title: "Écosystème de Banque Numérique Web3 & DEX", sub: "Liquidité · DEX · UBI · Expansion Mondiale", launch: "🚀 Lancement de l'échange DEX le 12 mars", pay: "Paiement", send: "Envoyer", stake: "Staking", reward: "Récompense", ubi: "RBU", support: "Support", balance: "Solde Total" },
        de: { title: "Web3 Digitalbank & DEX Ökosystem", sub: "Liquidität · DEX · UBI · Globale Expansion", launch: "🚀 DEX-Börsenstart am 12. März", pay: "Zahlung", send: "Senden", stake: "Anlegen", reward: "Belohnung", ubi: "BGE", support: "Support", balance: "Gesamtguthaben" },
        it: { title: "Ecosistema Bancario Digitale Web3 e DEX", sub: "Liquidità · DEX · UBI · Espansione Globale", launch: "🚀 Lancio dell'Exchange DEX il 12 marzo", pay: "Pagamento", send: "Invia", stake: "Stake", reward: "Premio", ubi: "Reddito Base", support: "Supporto", balance: "Saldo Totale" },
        pt: { title: "Ecossistema de Banco Digital Web3 e DEX", sub: "Liquidez · DEX · UBI · Expansão Global", launch: "🚀 Lançamento da Exchange DEX em 12 de março", pay: "Pagamento", send: "Enviar", stake: "Stake", reward: "Recompensa", ubi: "RBU", support: "Suporte", balance: "Saldo Total" },
        ru: { title: "Цифровой банк Web3 и экосистема DEX", sub: "Ликвидность · DEX · UBI · Глобальное расширение", launch: "🚀 Запуск биржи DEX 12 марта", pay: "Оплата", send: "Отправить", stake: "Стейкинг", reward: "Награда", ubi: "ББД", support: "Поддержка", balance: "Общий баланс" },
        ar: { title: "بنك Web3 الرقمي ونظام DEX البيئي", sub: "السيولة · DEX · UBI · التوسع العالمي", launch: "🚀 إطلاق بورصة DEX في 12 مارس", pay: "دفع", send: "إرسال", stake: "رهن", reward: "مكافأة", ubi: "الدخل الأساسي", support: "الدعم", balance: "إجمالي الرصيد" },
        hi: { title: "Web3 डिजिटल बैंक और DEX इकोसिस्टम", sub: "तरलता · DEX · UBI · वैश्विक विस्तार", launch: "🚀 12 मार्च को DEX एक्सचेंज लॉन्च", pay: "भुगतान", send: "भेजें", stake: "जमा करें", reward: "पुरस्कार", ubi: "बुनियादी आय", support: "सहायता", balance: "कुल शेष" },
        bn: { title: "Web3 ডিজিটাল ব্যাংক এবং DEX ইকোসিস্টেম", sub: "তারল্য · DEX · UBI · বিশ্বব্যাপী সম্প্রসারণ", launch: "🚀 ১২ মার্চ DEX এক্সচেঞ্জ চালু হবে", pay: "পেমেন্ট", send: "পাঠান", stake: "স্টেক", reward: "পুরস্কার", ubi: "মৌলিক আয়", support: "সহায়তা", balance: "মোট ব্যালেন্স" },
        id: { title: "Ekosistem Bank Digital Web3 & DEX", sub: "Likuiditas · DEX · UBI · Ekspansi Global", launch: "🚀 Peluncuran Bursa DEX pada 12 Maret", pay: "Pembayaran", send: "Kirim", stake: "Stake", reward: "Hadiah", ubi: "UBI", support: "Dukungan", balance: "Total Saldo" },
        vi: { title: "Hệ sinh thái Ngân hàng Số Web3 & DEX", sub: "Thanh khoản · DEX · UBI · Mở rộng Toàn cầu", launch: "🚀 Ra mắt sàn giao dịch DEX vào 12/3", pay: "Thanh toán", send: "Gửi", stake: "Gửi tiết kiệm", reward: "Thưởng", ubi: "Thu nhập cơ bản", support: "Hỗ trợ", balance: "Tổng số dư" },
        th: { title: "ระบบนิเวศธนาคารดิจิทัล Web3 & DEX", sub: "สภาพคล่อง · DEX · UBI · การขยายตัวทั่วโลก", launch: "🚀 เปิดตัวตลาด DEX วันที่ 12 มีนาคม", pay: "ชำระเงิน", send: "ส่ง", stake: "ฝาก", reward: "รางวัล", ubi: "รายได้พื้นฐาน", support: "สนับสนุน", balance: "ยอดคงเหลือทั้งหมด" },
        tr: { title: "Web3 Dijital Banka ve DEX Ekosistemi", sub: "Likidite · DEX · UBI · Küresel Genişleme", launch: "🚀 DEX Borsası 12 Mart'ta Açılıyor", pay: "Ödeme", send: "Gönder", stake: "Stake", reward: "Ödül", ubi: "Temel Gelir", support: "Destek", balance: "Toplam Bakiye" },
        pl: { title: "Cyfrowy Bank Web3 i Ekosystem DEX", sub: "Płynność · DEX · UBI · Globalna Ekspansja", launch: "🚀 Uruchomienie giełdy DEX 12 marca", pay: "Płatność", send: "Wyślij", stake: "Stake", reward: "Nagroda", ubi: "Dochód Podst.", support: "Wsparcie", balance: "Całkowite Saldo" },
        nl: { title: "Web3 Digitale Bank & DEX Ecosysteem", sub: "Liquiditeit · DEX · UBI · Wereldwijde Expansie", launch: "🚀 DEX Exchange-lancering op 12 maart", pay: "Betaling", send: "Verzenden", stake: "Staken", reward: "Beloning", ubi: "Basisinkomen", support: "Support", balance: "Totaal Saldo" },
        sv: { title: "Web3 Digital Bank & DEX Ecosystem", sub: "Likviditet · DEX · UBI · Global expansion", launch: "🚀 DEX-lansering den 12 mars", pay: "Betalning", send: "Skicka", stake: "Staka", reward: "Belöning", ubi: "Basinkomst", support: "Support", balance: "Total Balans" }
    };

    function changeLanguage(lang) {
        const t = data[lang];
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('subTitle').innerText = t.sub;
        document.getElementById('launchBanner').innerText = t.launch;
        document.getElementById('btnPay').innerText = t.pay;
        document.getElementById('btnSend').innerText = t.send;
        document.getElementById('btnStake').innerText = t.stake;
        document.getElementById('btnReward').innerText = t.reward;
        document.getElementById('btnUBI').innerText = t.ubi;
        document.getElementById('btnSupport').innerText = t.support;
        document.getElementById('balanceLabel').innerText = t.balance;
        
        // 폰트 크기 자동 조절 (언어별로 길이가 다르니까요!)
        if (lang === 'ar' || lang === 'hi' || lang === 'bn') {
            document.getElementById('mainTitle').style.fontSize = "20px";
        } else {
            document.getElementById('mainTitle').style.fontSize = "24px";
        }
    }

    // 처음 시작은 영어로 설정 (한국어로 하려면 'ko'로 변경)
    window.onload = () => changeLanguage('en');
</script>

</body>
</html>
