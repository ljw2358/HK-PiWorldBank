<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiWorldBank - Global Web3</title>
    <style>
        :root {
            --bg-color: #0b1426;
            --card-bg: #1a233a;
            --primary-orange: #f36f21;
            --accent-blue: #00b5d8;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Pretendard', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 헤더 & 언어 선택 */
        header {
            width: 100%; max-width: 500px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
        }
        .lang-btn {
            background: #2d3748; color: white; border: 1px solid #4a5568;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
        }

        /* 20개국어 모달 레이어 */
        #langModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            width: 85%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .modal-content button {
            background: #2d3748; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;
        }

        /* 메인 UI */
        .hero-section { text-align: center; margin-bottom: 20px; }
        .announcement {
            background-color: var(--primary-orange); color: black;
            width: 100%; max-width: 400px; padding: 15px; border-radius: 12px;
            text-align: center; font-weight: bold; margin-bottom: 25px;
        }

        /* 버튼 그리드 */
        .menu-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            width: 100%; max-width: 450px; margin-bottom: 30px;
        }
        .menu-item {
            background-color: #2d3748; padding: 20px 5px; border-radius: 15px;
            text-align: center; color: white; border: none; font-size: 1rem; cursor: pointer;
        }
        /* 고객센터 특별 강조 */
        .cs-btn {
            border: 2px solid var(--accent-blue);
            background-color: rgba(0, 181, 216, 0.1);
            color: var(--accent-blue);
            font-weight: bold;
        }

        .balance-card {
            background-color: var(--card-bg); width: 100%; max-width: 400px;
            padding: 30px; border-radius: 24px; margin-bottom: 20px;
        }
        .balance-amount { font-size: 2.8rem; font-weight: bold; }
        .balance-amount span { color: var(--primary-orange); }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.4rem; font-weight: bold;">🌍 PiWorldBank</div>
        <button class="lang-btn" onclick="toggleLang()">🌐 언어 선택 (20개국)</button>
    </header>

    <div id="langModal" onclick="toggleLang()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="changeLang('한국어')">🇰🇷 한국어</button>
            <button onclick="changeLang('English')">🇺🇸 English</button>
            <button onclick="changeLang('日本語')">🇯🇵 日本語</button>
            <button onclick="changeLang('中文')">🇨🇳 中文</button>
            <button onclick="changeLang('Tiếng Việt')">🇻🇳 Tiếng Việt</button>
            <button onclick="changeLang('Deutsch')">🇩🇪 Deutsch</button>
            <button onclick="changeLang('Français')">🇫🇷 Français</button>
            <button onclick="changeLang('Español')">🇪🇸 Español</button>
            <button onclick="changeLang('Português')">🇵🇹 Português</button>
            <button onclick="changeLang('Русский')">🇷🇺 Русский</button>
            <button onclick="changeLang('हिन्दी')">🇮🇳 हिन्दी</button>
            <button onclick="changeLang('العربية')">🇸🇦 العربية</button>
            <button onclick="changeLang('Bahasa Indonesia')">🇮🇩 Indonesia</button>
            <button onclick="changeLang('Türkçe')">🇹🇷 Türkçe</button>
            <button onclick="changeLang('Italiano')">🇮🇹 Italiano</button>
            <button onclick="changeLang('ไทย')">🇹🇭 ไทย</button>
            <button onclick="changeLang('Polski')">🇵🇱 Polski</button>
            <button onclick="changeLang('Nederlands')">🇳🇱 Nederlands</button>
            <button onclick="changeLang('Svenska')">🇸🇪 Svenska</button>
            <button onclick="changeLang('Tagalog')">🇵🇭 Tagalog</button>
        </div>
    </div>

    <div class="hero-section">
        <h1 id="mainTitle">Web3 디지털 뱅크 & DEX 생태계</h1>
        <p style="color: #63b3ed;">유동성 · DEX · UBI · 글로벌 확장</p>
    </div>

    <div class="announcement">
        📢 3월 12일 DEX 거래소 출시
    </div>

    <div class="menu-grid">
        <button class="menu-item">결제</button>
        <button class="menu-item">송금</button>
        <button class="menu-item">예치</button>
        <button class="menu-item">리워드</button>
        <button class="menu-item">기본소득</button>
        <button class="menu-item cs-btn">고객센터</button>
    </div>

    <div class="balance-card">
        <div style="color: #a0aec0; margin-bottom: 10px;">총 잔액</div>
        <div class="balance-amount">400 <span>Pi</span></div>
    </div>

    <script>
        function toggleLang() {
            const modal = document.getElementById('langModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }
        function changeLang(lang) {
            alert(lang + "으로 언어가 설정되었습니다.");
            toggleLang();
        }
    </script>
</body>
</html>
