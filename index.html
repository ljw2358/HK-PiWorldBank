<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiWorldBank</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.logo{
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.lang-select{
padding:6px 10px;
border-radius:20px;
border:none;
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:20px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
padding:30px 10px;
text-align:center;
cursor:pointer;
transition:0.3s;
font-size:16px;
font-weight:600;
}

.card:hover{
background:#00c6ff;
color:black;
transform:translateY(-5px);
}

.section{
display:none;
margin-top:40px;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
}

.active{
display:block;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:none;
}

button.action{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#00c6ff;
cursor:pointer;
font-weight:bold;
}

@media(max-width:1000px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:600px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

footer{
text-align:center;
margin-top:50px;
padding:20px;
opacity:0.7;
}
</style>

<script>
const t={
en:{pay:"Payment",send:"Transfer",vault:"Vault",reward:"Reward",ubi:"UBI",support:"Support"},
ko:{pay:"결제",send:"송금",vault:"예치",reward:"리워드",ubi:"UBI",support:"고객센터"},
zh:{pay:"支付",send:"转账",vault:"存款",reward:"奖励",ubi:"全民收入",support:"客服"},
ja:{pay:"支払い",send:"送金",vault:"預金",reward:"報酬",ubi:"UBI",support:"サポート"},
es:{pay:"Pago",send:"Transferencia",vault:"Depósito",reward:"Recompensa",ubi:"UBI",support:"Soporte"},
fr:{pay:"Paiement",send:"Transfert",vault:"Dépôt",reward:"Récompense",ubi:"UBI",support:"Support"},
de:{pay:"Zahlung",send:"Überweisung",vault:"Einlage",reward:"Belohnung",ubi:"UBI",support:"Support"},
ru:{pay:"Платеж",send:"Перевод",vault:"Вклад",reward:"Награда",ubi:"UBI",support:"Поддержка"},
pt:{pay:"Pagamento",send:"Transferência",vault:"Depósito",reward:"Recompensa",ubi:"UBI",support:"Suporte"},
it:{pay:"Pagamento",send:"Trasferimento",vault:"Deposito",reward:"Ricompensa",ubi:"UBI",support:"Supporto"},
hi:{pay:"भुगतान",send:"ट्रांसफर",vault:"जमा",reward:"इनाम",ubi:"UBI",support:"सहायता"},
tr:{pay:"Ödeme",send:"Transfer",vault:"Mevduat",reward:"Ödül",ubi:"UBI",support:"Destek"},
vi:{pay:"Thanh toán",send:"Chuyển tiền",vault:"Gửi tiền",reward:"Thưởng",ubi:"UBI",support:"Hỗ trợ"},
th:{pay:"ชำระเงิน",send:"โอนเงิน",vault:"ฝากเงิน",reward:"รางวัล",ubi:"UBI",support:"ฝ่ายช่วยเหลือ"},
id:{pay:"Pembayaran",send:"Transfer",vault:"Deposito",reward:"Hadiah",ubi:"UBI",support:"Dukungan"},
nl:{pay:"Betaling",send:"Overboeking",vault:"Storting",reward:"Beloning",ubi:"UBI",support:"Ondersteuning"},
pl:{pay:"Płatność",send:"Transfer",vault:"Depozyt",reward:"Nagroda",ubi:"UBI",support:"Wsparcie"},
sv:{pay:"Betalning",send:"Överföring",vault:"Insättning",reward:"Belöning",ubi:"UBI",support:"Support"},
he:{pay:"תשלום",send:"העברה",vault:"הפקדה",reward:"תגמול",ubi:"UBI",support:"תמיכה"},
ar:{pay:"دفع",send:"تحويل",vault:"إيداع",reward:"مكافأة",ubi:"UBI",support:"الدعم"}
};

function setLang(l){
if(!t[l]) l="en";
document.getElementById("pay").innerText=t[l].pay;
document.getElementById("send").innerText=t[l].send;
document.getElementById("vault").innerText=t[l].vault;
document.getElementById("reward").innerText=t[l].reward;
document.getElementById("ubi").innerText=t[l].ubi;
document.getElementById("support").innerText=t[l].support;
}

window.onload=function(){
let l=navigator.language.slice(0,2);
setLang(l);
}

function openSection(id){
let s=document.getElementsByClassName("section");
for(let i=0;i<s.length;i++) s[i].classList.remove("active");
document.getElementById(id).classList.add("active");
}
</script>

</head>
<body>

<header>
<div class="logo">🌍 PiWorldBank</div>
<select class="lang-select" onchange="setLang(this.value)">
<option value="en">EN</option>
<option value="ko">KO</option>
<option value="zh">ZH</option>
<option value="ja">JA</option>
<option value="es">ES</option>
<option value="fr">FR</option>
<option value="de">DE</option>
<option value="ru">RU</option>
<option value="pt">PT</option>
<option value="it">IT</option>
<option value="hi">HI</option>
<option value="tr">TR</option>
<option value="vi">VI</option>
<option value="th">TH</option>
<option value="id">ID</option>
<option value="nl">NL</option>
<option value="pl">PL</option>
<option value="sv">SV</option>
<option value="he">HE</option>
<option value="ar">AR</option>
</select>
</header>

<div class="container">

<div class="grid">
<div class="card" id="pay" onclick="openSection('payment')">Payment</div>
<div class="card" id="send" onclick="openSection('transfer')">Transfer</div>
<div class="card" id="vault" onclick="openSection('vaultSec')">Vault</div>
<div class="card" id="reward" onclick="openSection('rewardSec')">Reward</div>
<div class="card" id="ubi" onclick="openSection('ubiSec')">UBI</div>
<div class="card" id="support" onclick="openSection('supportSec')">Support</div>
</div>

<div id="payment" class="section">
<h2>Payment</h2>
<input placeholder="Amount (Pi)">
<button class="action">Execute Payment</button>
</div>

<div id="transfer" class="section">
<h2>Transfer</h2>
<input placeholder="Receiver">
<input placeholder="Amount (Pi)">
<button class="action">Send</button>
</div>

<div id="vaultSec" class="section">
<h2>Vault</h2>
<input placeholder="Deposit Amount (Pi)">
<button class="action">Start Deposit</button>
</div>

<div id="rewardSec" class="section">
<h2>Reward</h2>
<button class="action">Daily Check-in</button>
</div>

<div id="ubiSec" class="section">
<h2>UBI</h2>
<p>Universal Basic Income distribution module ready.</p>
</div>

<div id="supportSec" class="section">
<h2>Customer Support</h2>
<input placeholder="Email">
<input placeholder="Message">
<button class="action">Submit</button>
</div>

</div>

<footer>
Contact: info@hkglobal.com<br>
© 2026 PiWorldBank
</footer>

</body>
</html>
